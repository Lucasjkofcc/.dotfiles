#################################
# Picom Unixporn Smooth Config
#################################

#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.45;
shadow-offset-x = -8;
shadow-offset-y = -8;

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'i3bar'",
  "window_type = 'dock'"
];

#################################
# Transparency
#################################

inactive-opacity = 0.88;
active-opacity = 0.96;
frame-opacity = 0.85;

inactive-opacity-override = false;

focus-exclude = [
  "class_g = 'Cairo-clock'"
];

#################################
# Blur
#################################

blur-method = "dual_kawase";
blur-strength = 7;

blur-background = true;
blur-background-frame = true;

blur-kern = "3x3box";

#################################
# Fading
#################################

fading = true;

fade-delta = 8;

fade-in-step = 0.03;
fade-out-step = 0.03;

fade-exclude = [];

#################################
# Animations (picom-jonaburg)
#################################

animations = true;

animation-stiffness = 180;
animation-dampening = 18;
animation-clamping = true;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-transient-window = "slide-down";

animation-for-open-frame = "zoom";

animation-window-mass = 1;

#################################
# Rounded corners
#################################

corner-radius = 12;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Window rules
#################################

opacity-rule = [
  "92:class_g = 'Alacritty'",
  "90:class_g = 'kitty'",
  "88:class_g = 'URxvt'",
  "95:class_g = 'Firefox'"
];

#################################
# Performance
#################################

detect-client-opacity = true;
detect-rounded-corners = true;
detect-transient = true;
detect-client-leader = true;

use-damage = true;

#################################
# Misc
#################################

mark-wmwin-focused = true;
mark-ovredir-focused = true;

wintypes:
{
  tooltip = {
    fade = true;
    shadow = true;
    opacity = 0.92;
    focus = true;
  };

  dropdown_menu = {
    opacity = 0.95;
  };

  popup_menu = {
    opacity = 0.95;
  };

  dock = {
    shadow = false;
  };
};

