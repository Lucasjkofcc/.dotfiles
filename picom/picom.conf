#################################
# Backend
#################################

backend = "glx";

vsync = true;

#################################
# Sombra
#################################

shadow = true;

shadow-radius = 12;
shadow-opacity = 0.55;
shadow-offset-x = -7;
shadow-offset-y = -7;

shadow-exclude = [
  "class_g = 'Conky'",
  "name = 'Notification'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
# Transparência
#################################

inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 0.9;

inactive-opacity-override = false;


#################################
# Fading
#################################

fading = true;

fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;


#################################
# Blur (bom na 1050 Ti)
#################################

blur-method = "dual_kawase";

blur-strength = 8;

blur-background = true;

blur-background-frame = true;


#################################
# Regras de transparência
#################################

opacity-rule = [
  "90:class_g = 'kitty'",
  "85:class_g = 'Alacritty'",
  "95:class_g = 'Code'"
];


#################################
# Performance
#################################

use-damage = true;

detect-rounded-corners = true;

detect-client-opacity = true;

detect-transient = true;

mark-wmwin-focused = true;

mark-ovredir-focused = true;


#################################
# Arredondamento
#################################

corner-radius = 10;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];


#################################
# Wintypes
#################################

wintypes:
{
  tooltip = {
    fade = true;
    shadow = true;
    opacity = 0.95;
    focus = true;
  };

  dock = {
    shadow = false;
  };

  popup_menu = {
    opacity = 0.95;
  };

  dropdown_menu = {
    opacity = 0.95;
  };
};
